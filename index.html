<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />
    <link rel="stylesheet" href="./style/styles.css" />
    <title>Frontend Mentor | Social links profile</title>
  </head>
  <body>
    <main class="content">
      <h1 class="visually-hidden">Social links profile</h1>
      <article
        class="card"
        aria-labelledby="card-name"
        aria-describedby="card-description"
      >
        <div class="card__image-wrapper">
          <img
            src="./assets/images/avatar-jessica.jpeg"
            alt="Jessica Randall"
            width="88"
            height="88"
          />
        </div>
        <div class="card__info">
          <h2 class="card__name" id="card-name">Jessica Randall</h2>
          <p class="card__location">London, United Kingdom</p>
        </div>
        <p class="card__description" id="card-description">
          "Front-end developer and avid reader."
        </p>
        <ul class="card__list">
          <li class="card__item">
            <a class="card__link" href="#" target="_blank">GitHub</a>
          </li>
          <li class="card__item">
            <a class="card__link" href="#" target="_blank">Frontend Mentor</a>
          </li>
          <li class="card__item">
            <a class="card__link" href="#" target="_blank">LinkedIn</a>
          </li>
          <li class="card__item">
            <a class="card__link" href="#" target="_blank">Twitter</a>
          </li>
          <li class="card__item">
            <a class="card__link" href="#" target="_blank">Instagram</a>
          </li>
        </ul>
      </article>
    </main>
  </body>
</html>
